<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire CV</title>
</head>
<body>

<h1>Formulaire de Curriculum Vitæ</h1>

<form>
    <!-- Informations personnelles -->
    <h2>Informations personnelles</h2>
    <label for="nom">Nom :</label>
    <input type="text" id="nom" name="nom" required><br><br>

    <label for="prenom">Prénom :</label>
    <input type="text" id="prenom" name="prenom" required><br><br>

    <label for="email">Adresse e-mail :</label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="tel">Téléphone :</label>
    <input type="tel" id="tel" name="tel" required><br><br>

    <label for="adresse">Adresse :</label>
    <textarea id="adresse" name="adresse"></textarea><br><br>

    <!-- Formation -->
    <h2>Formation</h2>
    <label for="diplome">Diplôme :</label>
    <input type="text" id="diplome" name="diplome"><br><br>

    <label for="ecole">Établissement :</label>
    <input type="text" id="ecole" name="ecole"><br><br>

    <label for="annee">Année d’obtention :</label>
    <input type="number" id="annee" name="annee"><br><br>

    <!-- Expérience professionnelle -->
    <h2>Expérience professionnelle</h2>
    <label for="poste">Poste occupé :</label>
    <input type="text" id="poste" name="poste"><br><br>

    <label for="entreprise">Entreprise :</label>
    <input type="text" id="entreprise" name="entreprise"><br><br>

    <label for="periode">Période :</label>
    <input type="text" id="periode" name="periode" placeholder="ex: 2022-2024"><br><br>

    <label for="missions">Missions principales :</label>
    <textarea id="missions" name="missions"></textarea><br><br>

    <!-- Compétences -->
    <h2>Compétences</h2>
    <label for="competences">Liste de compétences :</label>
    <textarea id="competences" name="competences"></textarea><br><br>

    <!-- Langues -->
    <h2>Langues</h2>
    <label for="langues">Langues maîtrisées :</label>
    <textarea id="langues" name="langues"></textarea><br><br>

    <!-- Centres d’intérêt -->
    <h2>Centres d’intérêt</h2>
    <label for="interets">Vos centres d’intérêt :</label>
    <textarea id="interets" name="interets"></textarea><br><br>

    <!-- Bouton -->
    <button type="submit">Envoyer</button>
</form>

</body>
</html>
